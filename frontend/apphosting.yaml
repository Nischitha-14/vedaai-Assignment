runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_API_URL
    value: https://your-backend-project.vercel.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_WS_URL
    value: ""
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ENABLE_WS
    value: "false"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_MAX_UPLOAD_MB
    value: "4"
    availability:
      - BUILD
      - RUNTIME
